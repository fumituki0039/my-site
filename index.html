<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>平尾瑞希 - ポートフォリオ</title>
    <style>
        :root {
            --primary-color: #6b8e85;
            --text-color: #4a3e3d;
            --accent-bg: rgba(107, 142, 133, 0.2);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: var(--text-color);
            margin: 0;
            padding: 30px 15px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;

            /* 横の柄が見えるように幅を100%にし、縦にリピートさせつつ色をなじませる */
            background-image: 
                linear-gradient(to bottom, rgba(246, 243, 238, 0) 70%, rgba(246, 243, 238, 0.8) 100%),
                url('bg.jpg');
            background-size: 100% auto; /* 横幅100%にして横の柄をしっかり見せる */
            background-position: center top;
            background-repeat: repeat-y; /* 縦方向のみリピート */
            background-color: #f6f3ee;
        }

        .container {
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }

        .profile-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px auto;
            color: white;
            font-size: 1.1rem;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 1.4rem;
            margin: 0 0 6px 0;
            color: var(--text-color);
            letter-spacing: 0.05em;
        }

        .sub-info {
            font-size: 0.85rem;
            color: #665c5b;
            margin: 3px 0;
        }

        .section {
            margin-top: 40px;
            text-align: center;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--text-color);
            display: inline-block;
            position: relative;
            margin-bottom: 20px;
            padding: 2px 15px;
            letter-spacing: 0.1em;
        }

        .section-title::after {
            content: "";
            position: absolute;
            bottom: 2px;
            left: 0;
            width: 100%;
            height: 8px;
            background-color: var(--accent-bg);
            border-radius: 4px;
            z-index: -1;
        }

        .timeline {
            position: relative;
            padding-left: 35px;
            text-align: left;
            margin-top: 15px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 12px;
            top: 10px;
            bottom: 20px;
            width: 2px;
            border-left: 3px dotted var(--primary-color);
        }

        .timeline-item {
            position: relative;
            margin-bottom: 25px;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -30px;
            top: 4px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background-color: #ffffff;
            border: 4px solid var(--primary-color);
            box-shadow: 0 0 0 2px #ffffff;
        }

        .item-title {
            font-weight: bold;
            font-size: 1rem;
            color: var(--text-color);
            margin-bottom: 3px;
        }

        .item-sub {
            font-size: 0.88rem;
            color: #665c5b;
            margin-bottom: 3px;
        }

        .item-date {
            font-size: 0.8rem;
            color: #8c8281;
        }

        .description-text {
            font-size: 0.92rem;
            line-height: 1.7;
            color: var(--text-color);
            margin-bottom: 15px;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .photo-grid img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
            background-color: var(--primary-color);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="profile-header">
        <div class="avatar" id="avatar-container">写真</div>
        <h1 id="profile-name">氏名</h1>
        <div class="sub-info" id="profile-birth">生年月日</div>
        <div class="sub-info" id="profile-email">mail</div>
    </div>

    <div class="section">
        <div class="section-title">学歴</div>
        <div id="education-list" class="timeline"></div>
    </div>

    <div class="section">
        <div class="section-title">研究内容</div>
        <div id="research-content"></div>
    </div>

    <div class="section">
        <div class="section-title">実績</div>
        <div id="achievements-list" class="timeline"></div>
    </div>

    <div class="section">
        <div class="section-title">その他活動</div>
        <div id="other-content"></div>
    </div>
</div>

<script>
    fetch('data.json')
        .then(response => response.json())
        .then(data => {
            if (data.profile) {
                if (data.profile.name) document.getElementById('profile-name').textContent = data.profile.name;
                if (data.profile.birthdate) document.getElementById('profile-birth').textContent = data.profile.birthdate;
                if (data.profile.email) document.getElementById('profile-email').textContent = data.profile.email;
                if (data.profile.avatarImage) {
                    const avatarDiv = document.getElementById('avatar-container');
                    avatarDiv.innerHTML = `<img src="${data.profile.avatarImage}" alt="Profile" onerror="this.parentElement.textContent='写真'">`;
                }
            }

            if (data.education && Array.isArray(data.education)) {
                const eduContainer = document.getElementById('education-list');
                eduContainer.innerHTML = '';
                data.education.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'timeline-item';
                    div.innerHTML = `
                        <div class="item-title">${item.school || ''}</div>
                        <div class="item-sub">${item.detail || ''}</div>
                        <div class="item-date">${item.period || ''}</div>
                    `;
                    eduContainer.appendChild(div);
                });
            }

            if (data.research) {
                const resContainer = document.getElementById('research-content');
                let photosHtml = '';
                if (data.research.photos && Array.isArray(data.research.photos)) {
                    photosHtml = '<div class="photo-grid">' + 
                        data.research.photos.map(p => `<img src="${p}" alt="Research" onerror="this.style.display='none'">`).join('') + 
                        '</div>';
                }
                resContainer.innerHTML = `
                    <div class="description-text">${data.research.description || ''}</div>
                    ${photosHtml}
                `;
            }

            if (data.achievements && Array.isArray(data.achievements)) {
                const achContainer = document.getElementById('achievements-list');
                achContainer.innerHTML = '';
                data.achievements.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'timeline-item';
                    div.innerHTML = `
                        <div class="item-title">${item.title || ''}</div>
                        <div class="item-sub">${item.info || ''}</div>
                    `;
                    achContainer.appendChild(div);
                });
            }

            if (data.otherActivities) {
                const otherContainer = document.getElementById('other-content');
                let photosHtml = '';
                if (data.otherActivities.photos && Array.isArray(data.otherActivities.photos)) {
                    photosHtml = '<div class="photo-grid">' + 
                        data.otherActivities.photos.map(p => `<img src="${p}" alt="Activity" onerror="this.style.display='none'">`).join('') + 
                        '</div>';
                }
                otherContainer.innerHTML = `
                    <div class="description-text">${data.otherActivities.description || ''}</div>
                    ${photosHtml}
                `;
            }
        })
        .catch(err => console.error('JSON loading error:', err));
</script>

</body>
</html>
